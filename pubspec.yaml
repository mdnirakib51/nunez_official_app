name: nunez_official_app
description: "A new Flutter project."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management and Service Locator
  get: ^4.7.3
  dio: ^5.9.1

  # Local Storage
  shared_preferences: ^2.5.3 # Local Storage!

  in_app_update: ^4.2.3 # App Update Notifications

  # Localization and Utilities
  intl: ^0.19.0 # Localization and Date Formatting\

  # UI Enhancements
  image_picker: ^1.1.2
  video_player: ^2.8.1

  # Utilities!
  google_fonts: ^7.0.0
  device_info_plus: ^11.3.3
  connectivity_plus: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner:
  flutter_gen_runner:

flutter:

  uses-material-design: true

  assets:
    - assets/app_icons/
    - assets/app_images/
    - assets/required_src/
    - assets/social_ic/
    - assets/app_icons/buttom_nav_ic/
    - assets/app_icons/live_video_ic/
    - assets/dummy_img/